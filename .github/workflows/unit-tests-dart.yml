name: unit-tests-dart

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "app/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Run tests
        working-directory: app
        run: flutter test
