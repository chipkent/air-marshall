name: lint-python

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format
        run: uv run ruff format src tests --check

      - name: mypy
        run: uv run mypy src
